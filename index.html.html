<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRIran</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body{
background:#111;
color:#fff;
font-family:Vazirmatn,sans-serif;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1b1b1b;
padding:30px;
border-radius:15px;
width:420px;
text-align:center;
box-shadow:0 0 20px #00ff66;
}

h1{
color:#00ff66;
}

input{
width:100%;
padding:12px;
margin:10px 0;
background:#222;
color:white;
border:1px solid #00ff66;
border-radius:8px;
}

button{
background:#00ff66;
color:black;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:18px;
width:100%;
margin-top:10px;
}

button:hover{
background:#00cc55;
}

#qrcode{
margin-top:20px;
display:flex;
justify-content:center;
}
</style>

</head>

<body>

<div class="box">

<h1>QRIran</h1>

<input id="text" placeholder="متن یا لینک را وارد کنید">

<button onclick="makeQR()">ساخت QR Code</button>

<div id="qrcode"></div>

</div>

<script>

function makeQR(){

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{

text:document.getElementById("text").value,

width:250,

height:250,

colorDark:"#00ff66",

colorLight:"#ffffff"

});

}

</script>

</body>
</html>
