<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QRIran | ساخت QR Code</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
*{
box-sizing:border-box;
font-family:tahoma, sans-serif;
}

body{
margin:0;
min-height:100vh;
background:#050505;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.card{
width:420px;
background:#111;
padding:30px;
border-radius:20px;
box-shadow:0 0 25px #00ff66;
text-align:center;
}

.logo{
font-size:38px;
font-weight:bold;
color:#00ff66;
}

p{
color:#ccc;
}

input{
width:100%;
padding:15px;
margin:15px 0;
border-radius:10px;
border:1px solid #00ff66;
background:#222;
color:white;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:0;
border-radius:10px;
background:#00ff66;
color:#000;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00cc55;
}

#qrcode{
margin:25px auto;
background:white;
padding:10px;
width:max-content;
}

.download{
display:none;
background:#222;
color:#00ff66;
margin-top:10px;
border:1px solid #00ff66;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
QRIran
</div>

<p>
ساخت سریع QR Code تجاری
</p>

<input id="text" placeholder="متن یا لینک را وارد کنید">

<button onclick="createQR()">
ساخت QR Code
</button>

<div id="qrcode"></div>

<button id="download" class="download" onclick="downloadQR()">
دانلود QR
</button>

<div class="footer">
© QRIran
</div>

</div>


<script>

function createQR(){

let box=document.getElementById("qrcode");

box.innerHTML="";

let text=document.getElementById("text").value;

new QRCode(box,{
text:text,
width:250,
height:250
});

document.getElementById("download").style.display="block";

}


function downloadQR(){

let img=document.querySelector("#qrcode img");

let link=document.createElement("a");

link.href=img.src;

link.download="qriran.png";

link.click();

}

</script>

</body>
</html>
