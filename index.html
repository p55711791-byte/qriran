<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QRIran</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
background:#050505;
color:white;
font-family:tahoma;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.box{
background:#111;
width:420px;
padding:30px;
border-radius:20px;
box-shadow:0 0 25px #00ff66;
text-align:center;
}

h1{
color:#00ff66;
font-size:40px;
}

input,select{
width:100%;
padding:13px;
margin:8px 0;
background:#222;
color:white;
border:1px solid #00ff66;
border-radius:10px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
background:#00ff66;
border:0;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

#qrcode{
margin:20px auto;
background:white;
padding:10px;
width:max-content;
}

#download{
display:none;
}

label{
display:block;
text-align:right;
margin-top:10px;
color:#00ff66;
}

</style>

</head>

<body>

<div class="box">

<h1>QRIran</h1>

<select id="type">
<option value="text">متن</option>
<option value="url">لینک</option>
<option value="phone">شماره تماس</option>
<option value="email">ایمیل</option>
<option value="wifi">وای‌فای</option>
</select>

<input id="data" placeholder="اطلاعات را وارد کنید">


<label>رنگ QR</label>
<input type="color" id="qrColor" value="#00ff66">


<label>رنگ پس زمینه</label>
<input type="color" id="bgColor" value="#ffffff">


<button onclick="makeQR()">
ساخت QR Code
</button>


<div id="qrcode"></div>


<button id="download" onclick="downloadQR()">
دانلود QR
</button>


</div>


<script>

function makeQR(){

let text=document.getElementById("data").value;
let type=document.getElementById("type").value;

let color=document.getElementById("qrColor").value;
let bg=document.getElementById("bgColor").value;


if(type=="phone"){
text="TEL:"+text;
}

if(type=="email"){
text="mailto:"+text;
}

if(type=="wifi"){
text="WIFI:T:WPA;S:"+text+";;";
}


let box=document.getElementById("qrcode");

box.innerHTML="";


new QRCode(box,{
text:text,
width:250,
height:250,
colorDark:color,
colorLight:bg
});


document.getElementById("download").style.display="block";

}


function downloadQR(){

let img=document.querySelector("#qrcode img");

let a=document.createElement("a");

a.href=img.src;
a.download="QRIran-QR.png";

a.click();

}

</script>

</body>
</html>
