<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QRIran</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:tahoma;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:#111;
    width:420px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 25px #00ff66;
}

h1{
    color:#00ff66;
    font-size:40px;
}

select,input{
    width:100%;
    padding:14px;
    margin:8px 0;
    background:#222;
    color:white;
    border:1px solid #00ff66;
    border-radius:10px;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#00ff66;
    color:#000;
    border:0;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00cc55;
}

#qrcode{
    margin:25px auto;
    background:white;
    padding:10px;
    width:max-content;
}

#download{
    display:none;
}

</style>

</head>

<body>

<div class="box">

<h1>QRIran</h1>

<select id="type">
<option value="text">متن</option>
<option value="url">لینک</option>
<option value="phone">شماره تماس</option>
<option value="email">ایمیل</option>
<option value="wifi">وای‌فای</option>
</select>


<input id="data" placeholder="اطلاعات QR را وارد کنید">


<button onclick="makeQR()">
ساخت QR Code
</button>


<div id="qrcode"></div>


<button id="download" onclick="downloadQR()">
دانلود QR
</button>


</div>


<script>

function makeQR(){

let value=document.getElementById("data").value;
let type=document.getElementById("type").value;

if(type=="phone"){
value="TEL:"+value;
}

if(type=="email"){
value="mailto:"+value;
}

if(type=="wifi"){
value="WIFI:T:WPA;S:"+value+";;";
}


let box=document.getElementById("qrcode");
box.innerHTML="";


new QRCode(box,{
text:value,
width:250,
height:250
});


document.getElementById("download").style.display="block";

}



function downloadQR(){

let img=document.querySelector("#qrcode img");

let a=document.createElement("a");

a.href=img.src;
a.download="QRIran.png";
a.click();

}

</script>

</body>
</html>
