<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>املاک کامبیز</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:tahoma,sans-serif}
body{
background:#f5f7fa;display:flex;justify-content:center;align-items:center;
min-height:100vh;padding:20px;transition:.4s;
box-shadow:inset 0 12px 35px #00ff55,inset 0 -12px 35px #00ff55,inset 12px 35px red,inset -12px 35px red;
}
.card{background:#fff;width:100%;max-width:420px;border-radius:20px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,.12);text-align:center;animation:fade .7s}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.logo{font-size:70px}h1{color:#0d47a1;margin:10px 0 5px}.subtitle{color:#666;margin-bottom:25px}
.box{background:#f1f5f9;padding:15px;border-radius:15px;margin-bottom:15px}
.box h3{margin-bottom:10px;color:#0d47a1}
.button{display:block;background:#1565c0;color:#fff;padding:14px;border-radius:12px;text-decoration:none;margin-top:10px}
.footer{margin-top:20px;color:#777}
#themeBtn{position:fixed;left:20px;bottom:20px;width:60px;height:60px;border:none;border-radius:50%;
background:linear-gradient(45deg,#1565c0,#42a5f5);color:#fff;font-size:28px;cursor:pointer;
box-shadow:0 0 20px rgba(0,0,0,.4);animation:f 2s infinite}
@keyframes f{50%{transform:translateY(-8px)}}
.dark{background:#121212;color:#fff}
.dark .card{background:#1e1e1e;color:#fff}
.dark .box{background:#2d2d2d}
.dark h1,.dark h3{color:#64b5f6}
.dark .subtitle,.dark .footer{color:#ddd}
</style>
</head>
<body>
<button id="themeBtn">🌙</button>
<div class="card">
<div class="logo">🏠</div>
<h1>املاک کامبیز</h1>
<div class="subtitle">خرید • فروش • رهن • اجاره</div>
<div class="box"><h3>📞 تماس</h3>
<div>09128126273</div><a class="button" href="tel:09128126273">تماس با شماره اول</a><br>
<div>09126902153</div><a class="button" href="tel:09126902153">تماس با شماره دوم</a></div>
<div class="box"><h3>📍 آدرس</h3>بلوار دولت غربی، نبش کوچه ۵</div>
<div class="box"><h3>🕒 ساعات کاری</h3>۹:۰۰ تا ۱۳:۰۰<br><br>۱۷:۰۰ تا ۲۱:۰۰</div>
<div class="footer">املاک کامبیز</div>
</div>
<script>
const btn=document.getElementById('themeBtn');
if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');btn.textContent='☀️';}
btn.onclick=()=>{document.body.classList.toggle('dark');
const d=document.body.classList.contains('dark');
localStorage.setItem('theme',d?'dark':'light');
btn.textContent=d?'☀️':'🌙';}
</script>
</body></html>
